name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Build API Docker image
        run: docker build -t webhook-pipeline-api .
      - name: Build Worker Docker image
        run: docker build -f Dockerfile.worker -t webhook-pipeline-worker .
