name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build API Docker image
        run: docker build -t webhook-pipeline-api .

      - name: Build Worker Docker image
        run: docker build -f Dockerfile.worker -t webhook-pipeline-worker .
